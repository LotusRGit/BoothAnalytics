name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BoothAnalytics/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: BoothAnalytics

      - name: Build Electron app
        run: npm run electron:build:exe
        working-directory: BoothAnalytics

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: BoothAnalytics/release/*.exe
          generate_release_notes: true
