name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
          echo "diff_lines=$(wc -l < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Review with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, subprocess, sys

          diff = open("/tmp/pr_diff.txt").read()
          # Limit diff to ~60,000 chars to stay within token limits
          if len(diff) > 60000:
              diff = diff[:60000] + "\n\n... (差分が長いため一部省略されました)"

          payload = {
              "model": "claude-opus-4-7",
              "max_tokens": 2048,
              "system": [
                  {
                      "type": "text",
                      "text": (
                          "あなたはBoothAnalyticsプロジェクトのシニアコードレビュアーです。\n"
                          "このプロジェクトはReact + Vite + Electronで作られたBooth販売データ分析デスクトップアプリです。\n"
                          "Pull Requestの差分をレビューし、日本語で簡潔にフィードバックしてください。"
                      ),
                      "cache_control": {"type": "ephemeral"}
                  }
              ],
              "messages": [
                  {
                      "role": "user",
                      "content": (
                          "以下のPull Requestの差分をレビューしてください。\n\n"
                          "## レビュー観点\n"
                          "1. **バグ・問題点**: 明らかなバグや潜在的な問題\n"
                          "2. **パフォーマンス**: 不要な再レンダリングや重い処理\n"
                          "3. **コード品質**: 可読性・保守性・命名\n"
                          "4. **改善提案**: より良い書き方があれば\n"
                          "5. **総評**: 全体的な評価（問題なし / 軽微な修正推奨 / 要修正）\n\n"
                          "問題がなければ「問題なし ✅」と一言で済ませて構いません。\n\n"
                          "## 差分\n"
                          f"```diff\n{diff}\n```"
                      )
                  }
              ]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
              method="POST"
          )

          with urllib.request.urlopen(req, timeout=120) as resp:
              result = json.loads(resp.read())

          review_text = result["content"][0]["text"]
          with open("/tmp/review.txt", "w", encoding="utf-8") as f:
              f.write(review_text)

          print("Review generated successfully.")
          PYEOF

      - name: Post review comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat /tmp/review.txt)
          BODY=$(python3 -c "
          import json, sys
          review = open('/tmp/review.txt', encoding='utf-8').read()
          body = '## 🤖 Claude によるコードレビュー\n\n' + review + '\n\n---\n*powered by Claude Opus 4.7*'
          print(json.dumps(body))
          ")

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d "{\"body\": $BODY}"
